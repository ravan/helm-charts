{{- if include "elemental-lifecycle-manager.leaderElectionEnabled" . }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "elemental-lifecycle-manager.leaderRoleName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "elemental-lifecycle-manager.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "elemental-lifecycle-manager.leaderRoleBindingName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "elemental-lifecycle-manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "elemental-lifecycle-manager.leaderRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "elemental-lifecycle-manager.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
